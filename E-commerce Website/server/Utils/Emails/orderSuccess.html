<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .header { background-color: #333; color: #fff; text-align: center; padding: 25px 20px; }
        .header h1 { font-size: 28px; margin: 0; font-weight: 600; }
        .content { padding: 30px; color: #444; }
        .content h2 { color: #555; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 25px; }
        .status-badge { display: inline-block; background-color: #4CAF50; color: white; padding: 6px 12px; border-radius: 50px; font-weight: bold; margin-left: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { background-color: #f9f9f9; padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee; }
        .cta-button { display: inline-block; background-color: #333; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 50px; margin-top: 20px; text-align: center; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; background-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Harryesthetics</h1>
        </div>
        <div class="content">
            <h1>Your Order is {{status}}!</h1>
            <p>Hi {{userName}},</p>
            <p>We're excited to inform you that your order is now
                <span class="status-badge">Processed</span>.</p>
            
            <h2>Order Details:</h2>
            <p><strong>Order ID:</strong> {{orderId}}</p>
            <p><strong>Total Price:</strong> ${{totalPrice}}</p>
            <p><strong>Shipping Address:</strong> {{address}}</p>

            <div style="text-align: center;">
                <a href="http://localhost:5173/user/products" class="cta-button">Continue Shopping</a>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2025 Harryesthetics. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
